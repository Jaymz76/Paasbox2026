<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betaling verwerkt · Ateliercuisine Rosier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Cormorant Garamond', Georgia, serif; background: #f5f0e8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #fff; border-radius: 8px; padding: 48px 40px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 2px 20px rgba(0,0,0,0.06); }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { color: #2d5016; font-size: 28px; font-weight: 400; margin-bottom: 16px; }
  p { color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 12px; }
  .nr { color: #8b6914; font-size: 14px; letter-spacing: 1px; margin: 24px 0; }
  .btn { display: inline-block; margin-top: 24px; padding: 14px 32px; background: #2d5016; color: #fff; text-decoration: none; border-radius: 4px; font-family: inherit; font-size: 15px; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #e8dcc8; border-top-color: #2d5016; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card" id="inhoud">
  <div class="icon">⏳</div>
  <h1 id="titel">Betaling controleren...</h1>
  <p id="tekst">Even geduld, we verifiëren je betaling.</p>
  <p class="nr" id="nr"></p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const mollieId = params.get('mollieId') || (id ? localStorage.getItem('mollieId_' + id) : null);

  async function controleer() {
    if (!mollieId && !id) { toonFout(); return; }

    try {
      const resp = await fetch('/api/betaling-status?mollieId=' + encodeURIComponent(mollieId || id));
      const data = await resp.json();

      if (data.status === 'paid') {
        // Update lokale bestelling naar betaald
        const DB_KEY = 'rosier_bestellingen';
        const bestellingen = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
        const idx = bestellingen.findIndex(b => b.id === id);
        if (idx !== -1) { bestellingen[idx].status = 'betaald'; localStorage.setItem(DB_KEY, JSON.stringify(bestellingen)); }

        document.getElementById('icon').textContent = '🐣';
        document.getElementById('titel').textContent = 'Bestelling bevestigd!';
        document.getElementById('tekst').textContent = 'Bedankt voor je bestelling bij Ateliercuisine Rosier. Je ontvangt een bevestiging per e-mail.';
        document.getElementById('nr').innerHTML = 'Bestelnummer: <strong>#' + id + '</strong>';
        document.getElementById('inhoud').insertAdjacentHTML('beforeend', '<a class="btn" href="/">Terug naar de site</a>');

      } else if (data.status === 'failed' || data.status === 'canceled' || data.status === 'expired') {
        toonFout(data.status);
      } else {
        // Nog niet betaald, probeer opnieuw
        setTimeout(controleer, 2000);
      }
    } catch (e) {
      setTimeout(controleer, 3000);
    }
  }

  function toonFout(status) {
    document.getElementById('icon').textContent = '❌';
    document.getElementById('titel').textContent = 'Betaling niet geslaagd';
    document.getElementById('tekst').textContent = status === 'canceled' ? 'Je hebt de betaling geannuleerd.' : 'Er ging iets mis met de betaling.';
    document.getElementById('inhoud').insertAdjacentHTML('beforeend', '<a class="btn" href="/">Probeer opnieuw</a>');
  }

  controleer();
</script>
</body>
</html>
